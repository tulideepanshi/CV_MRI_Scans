##############################################################################
# Nginx Reverse Proxy — Brain Tumor Classification API + Frontend
#
# ARCHITECTURE:
#   Browser → nginx:80 → /             → serves frontend/index.html
#                       → /predict      → proxies to api:8000
#                       → /health       → proxies to api:8000
#                       → /model        → proxies to api:8000
##############################################################################

events {
    worker_connections 1024;
}

http {
    # MIME types — needed for serving static files correctly
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone — must be inside http block
    # 10m = 10MB shared memory (~160,000 unique IPs)
    # rate=10r/s = 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Connection limiting — max 10 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream — the FastAPI server(s)
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size — matches API's MAX_FILE_SIZE_MB
        client_max_body_size 10m;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Frontend: serve static HTML ----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ---- Health check — no rate limiting ----
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Prediction endpoints — rate limited ----
        location /predict {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ---- Model info ----
        location /model {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Swagger docs ----
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api_backend/openapi.json;
            proxy_set_header Host $host;
        }
    }
}
