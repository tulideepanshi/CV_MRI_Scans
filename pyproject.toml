# ============================================================
# Project configuration — pytest, ruff, coverage
# ============================================================

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
source = ["src"]
omit = [
    "src/data/explore.py",        # EDA notebook script
    "src/data/compare_splits.py", # One-off comparison script
    "src/training/trainer.py",    # Requires GPU + full dataset
    "src/evaluation/evaluator.py", # Requires trained checkpoint
    "scripts/*",                  # CLI entry points
]

[tool.coverage.report]
show_missing = true
fail_under = 60
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
]
